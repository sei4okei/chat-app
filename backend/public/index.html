<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; height: 100vh; display: flex; overflow: hidden; }
        .unread-badge { background-color: #f44336; color: white; border-radius: 10px; padding: 2px 6px; font-size: 11px; margin-left: 8px; display: inline-block; }
        .message-status { display: inline-block; margin-left: 6px; font-size: 12px; }
        .status-sent { opacity: 0.6; }
        .status-read { color: #4caf50; }
        .sidebar { width: 280px; background: white; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #e0e0e0; font-weight: bold; font-size: 18px; background: #f8f9fa; }
        .tabs { display: flex; border-bottom: 1px solid #e0e0e0; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; background: #f8f9fa; transition: 0.2s; font-weight: 500; }
        .tab.active { background: white; border-bottom: 2px solid #0084ff; color: #0084ff; }
        .users-list, .chats-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-item, .chat-item { display: flex; align-items: center; padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 4px; transition: background 0.1s; }
        .user-item:hover, .chat-item:hover { background: #f0f2f5; }
        .avatar { position: relative; width: 40px; height: 40px; border-radius: 50%; background: #0084ff; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; margin-right: 12px; flex-shrink: 0; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .status-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; background-color: #ccc; }
        .status-dot.online { background-color: #4caf50; }
        .status-dot.offline { background-color: #f44336; }
        .user-info, .chat-info { flex: 1; overflow: hidden; }
        .username, .chat-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #e9eef3; }
        .chat-header { padding: 15px 20px; background: white; border-bottom: 1px solid #e0e0e0; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .message { max-width: 70%; margin-bottom: 12px; display: flex; flex-direction: column; }
        .message.own { align-self: flex-end; align-items: flex-end; }
        .message-bubble { padding: 8px 12px; border-radius: 18px; background: white; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .message.own .message-bubble { background: #0084ff; color: white; }
        .message-meta { font-size: 11px; margin: 4px 8px 0; color: #6c757d; }
        .message.own .message-meta { color: #aaa; }
        .message-media { max-width: 300px; max-height: 300px; border-radius: 12px; margin-top: 4px; cursor: pointer; }
        .message-input-area { padding: 15px; background: white; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; align-items: center; }
        .message-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; resize: none; font-family: inherit; font-size: 14px; }
        button { background: #0084ff; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .file-input-label { background: #e0e0e0; padding: 8px 12px; border-radius: 20px; cursor: pointer; color: #333; }
        .create-chat-btn { margin: 10px; background: #28a745; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 300px; max-width: 90%; }
        .modal-content input, .modal-content select { width: 100%; padding: 8px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            Чат
            <div style="float: right; font-size: 14px;">
                <span id="currentUsername">Загрузка...</span>
                <button id="editProfileBtn" style="background: none; border: none; font-size: 16px;">✏️</button>
            </div>
        </div>
        <div class="tabs">
            <div class="tab active" data-tab="users">Люди</div>
            <div class="tab" data-tab="chats">Чаты</div>
        </div>
        <div id="usersList" class="users-list"></div>
        <div id="chatsList" class="chats-list" style="display: none;"></div>
        <button id="createChatBtn" class="create-chat-btn">+ Новый чат</button>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <span id="currentChatName">Выберите чат</span>
        </div>
        <div id="messages" class="messages"></div>
        <div class="message-input-area">
            <label class="file-input-label" for="fileInput">📎</label>
            <input type="file" id="fileInput" style="display: none;" accept="image/*,video/*">
            <textarea id="messageInput" class="message-input" rows="1" placeholder="Сообщение..."></textarea>
            <button id="sendBtn">Отправить</button>
        </div>
    </div>

    <div id="profileModal" class="modal"><div class="modal-content"><h3>Редактировать профиль</h3><input type="text" id="profileUsername" placeholder="Новый никнейм"><input type="text" id="profileAvatar" placeholder="URL аватара"><button id="saveProfileBtn">Сохранить</button><button id="closeProfileBtn">Отмена</button></div></div>
    <div id="createChatModal" class="modal"><div class="modal-content"><h3>Новый чат</h3><input type="text" id="chatName" placeholder="Название чата (опционально)"><select id="chatParticipants" multiple size="5"></select><button id="confirmCreateChatBtn">Создать</button><button id="closeCreateChatBtn">Отмена</button></div></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/socket.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
